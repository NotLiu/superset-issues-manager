# docker-compose.yaml — Issue Triage & Auto-Resolve Automation
#
# Runs the full system flow locally:
#   - postgres: shared datastore (corpus + metrics)
#   - triage:   CLI/service container for running the triage pipeline
#   - dashboard: metrics dashboard web UI
#
# Usage:
#   docker compose up -d postgres       # start the datastore
#   docker compose up dashboard         # start the dashboard (http://localhost:8765)
#   docker compose --profile cli run --rm triage ingest.py --from-seed ../data/corpus__apache__superset.jsonl
#   docker compose --profile cli run --rm triage triage.py --text "ChunkLoadError loading lazy bundle" --dry-run
#
# To connect to the hosted Neon Postgres instead of the local one, set
# TRIAGE_DATABASE_URL in your shell or in a .env file alongside this file.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: triage
      POSTGRES_USER: triage
      POSTGRES_PASSWORD: triage_local
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U triage"]
      interval: 5s
      timeout: 3s
      retries: 5

  triage:
    build: .
    environment:
      TRIAGE_DATABASE_URL: ${TRIAGE_DATABASE_URL:-postgresql://triage:triage_local@postgres:5432/triage}
      GH_TOKEN: ${GH_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./data:/app/data
    entrypoint: ["python"]
    command: ["db.py"]
    profiles:
      - cli

  dashboard:
    build: .
    environment:
      TRIAGE_DATABASE_URL: ${TRIAGE_DATABASE_URL:-postgresql://triage:triage_local@postgres:5432/triage}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8765:8765"
    command: ["python", "dashboard.py", "--host", "0.0.0.0", "--port", "8765"]

volumes:
  pgdata:
